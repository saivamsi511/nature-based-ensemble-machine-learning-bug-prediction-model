{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <title>Register Your Details</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <!-- Bootstrap and Fonts -->
  <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500&family=Roboto:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      background-color: #f4f4f9;
      font-family: 'Roboto', sans-serif;
    }

    .container {
      background-color: #ffffff;
      padding: 40px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      border-radius: 10px;
      max-width: 800px;
      margin-top: 60px;
      animation: fadeIn 1s ease-out;
    }

    /* Fade-In Effect */
    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    #title {
      font-family: 'Raleway', sans-serif;
      font-size: 36px;
      font-weight: 600;
      color: #4CAF50;
      text-align: center;
      margin-bottom: 25px;
    }

    label {
      font-weight: 500;
      margin-bottom: 8px;
      display: block;
    }

    input, select, textarea {
      border-radius: 8px;
      padding: 12px 18px;
      width: 100%;
      margin-bottom: 20px;
      border: 1px solid #ddd;
      font-size: 16px;
      transition: all 0.3s ease;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #4CAF50;
      box-shadow: 0 0 8px rgba(76, 175, 80, 0.5);
      outline: none;
    }

    .btn-primary {
      background-color: #4CAF50;
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 18px;
      width: 100%;
      transition: background-color 0.3s ease;
    }

    .btn-primary:hover {
      background-color: #45a049;
      cursor: pointer;
    }

    .status-box {
      background-color: #f1f1f1;
      color: #4CAF50;
      font-weight: 600;
      padding: 10px;
      border-radius: 8px;
      margin-top: 20px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .link-area {
      margin-top: 30px;
      text-align: center;
    }

    .link-area a {
      color: #4CAF50;
      font-weight: 600;
      margin: 0 15px;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .link-area a:hover {
      color: #388E3C;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2 id="title">Register Your Details</h2>
    <form method="POST">
      {% csrf_token %}
      
      <label>Username</label>
      <input type="text" name="username" placeholder="Enter Username" required>

      <label>Email</label>
      <input type="email" name="email" placeholder="Enter Email" required>

      <label>Gender</label>
      <select name="gender" required>
        <option value="">-- Select Gender --</option>
        <option>Male</option>
        <option>Female</option>
      </select>

      <label>Password</label>
      <input type="password" name="password" placeholder="Enter Password" required>

      <label>Address</label>
      <textarea name="address" placeholder="Enter Address" rows="4" required></textarea>

      <label>Phone Number</label>
      <input type="number" name="phoneno" placeholder="Enter Phone Number" required>

      <label>Country</label>
      <input type="text" name="country" placeholder="Enter Country" required>

      <label>State</label>
      <input type="text" name="state" placeholder="Enter State" required>

      <label>City</label>
      <input type="text" name="city" placeholder="Enter City" required>

      <button type="submit" class="btn btn-primary">Register</button>
    </form>

    <div class="status-box">
      Registered Status: <strong>{{object}}</strong>
    </div>

    <div class="link-area">
      <a href="{% url 'login' %}">Remote User</a> |
      <a href="{% url 'serviceproviderlogin' %}">Service Provider</a>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
